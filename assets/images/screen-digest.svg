<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1600" role="img" aria-labelledby="title desc">
  <title id="title">Notisaver digest screen mockup</title>
  <desc id="desc">A stylized preview of the Notisaver daily digest screen.</desc>
  <defs>
    <linearGradient id="card" x1="180" y1="200" x2="620" y2="1240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1f1814"/>
      <stop offset="1" stop-color="#14100d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1600" rx="64" fill="#0d0b0a"/>
  <circle cx="128" cy="210" r="180" fill="#f2b24d" opacity=".07"/>
  <text x="72" y="122" fill="#f4efe6" font-family="Space Grotesk, sans-serif" font-size="32">9:41</text>
  <text x="72" y="210" fill="#f7d08a" font-family="Fraunces, serif" font-size="72">Daily Digest</text>
  <text x="72" y="262" fill="#c9bea9" font-family="Space Grotesk, sans-serif" font-size="28">A calmer summary of notification volume and signal</text>
  <rect x="72" y="320" width="656" height="350" rx="42" fill="url(#card)" stroke="#f7d08a" stroke-opacity=".18"/>
  <circle cx="220" cy="492" r="110" fill="none" stroke="#3a2c21" stroke-width="28"/>
  <circle cx="220" cy="492" r="110" fill="none" stroke="#f7d08a" stroke-width="28" stroke-linecap="round" stroke-dasharray="500 691" transform="rotate(-90 220 492)"/>
  <text x="178" y="506" fill="#f7f1e6" font-family="Space Grotesk, sans-serif" font-size="42" font-weight="700">82%</text>
  <text x="402" y="442" fill="#f7f1e6" font-family="Space Grotesk, sans-serif" font-size="36" font-weight="700">Highlights</text>
  <text x="402" y="500" fill="#c9bea9" font-family="Space Grotesk, sans-serif" font-size="28">3 urgent finance alerts</text>
  <text x="402" y="548" fill="#c9bea9" font-family="Space Grotesk, sans-serif" font-size="28">12 chat replies after 6 PM</text>
  <text x="402" y="596" fill="#c9bea9" font-family="Space Grotesk, sans-serif" font-size="28">2 exports created today</text>
  <rect x="72" y="720" width="656" height="168" rx="38" fill="#15110e"/>
  <rect x="72" y="920" width="656" height="168" rx="38" fill="#15110e"/>
  <rect x="72" y="1120" width="656" height="288" rx="42" fill="#15110e"/>
  <path d="M124 786h168" stroke="#f7d08a" stroke-width="18" stroke-linecap="round"/>
  <path d="M124 822h468" stroke="#86745e" stroke-width="14" stroke-linecap="round"/>
  <path d="M124 986h140" stroke="#f7d08a" stroke-width="18" stroke-linecap="round"/>
  <path d="M124 1022h492" stroke="#86745e" stroke-width="14" stroke-linecap="round"/>
  <path d="M126 1192l74-92 68 56 98-122 86 118 74-74 72 114" fill="none" stroke="#f7d08a" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
